# Browser configuration (ftrack_inout plugin level, not per-DCC)
# Path: ftrack_plugins/ftrack_inout/browser_config.yaml

# Sequence component display in the components list.
# true  — show frame range and count: "name (.%04d.sc) 1001 - 1721 (720)" — loads all members (~10s per component for long sequences).
# false — show pattern only, no member count: "name (.%04d.sc)" — fast, no member load.
show_sequence_frame_range: false

# Project list filter: only show projects whose status is in the list.
# enabled: true  — show only projects with status in statuses (e.g. только активные).
# enabled: false — show all projects (statuses ignored).
# statuses: names as in your ftrack workspace (Project status field). Names are workspace-specific.
#   Typical variants (проверьте в вашем workspace: Help → API reference или выпадающий статус проекта):
#   - "Active"   — активные проекты (часто по умолчанию)
#   - "Archived" — архивированныеcd ..

#   - "Backup"   — бэкапные / резервные
#   - "On hold"  — на паузе
#   Можно несколько: ["Active", "On hold"]. Пустой список при enabled: true = не показывать ни один проект.
project_filter:
  enabled: true
  statuses:
    - "Active"

# Per-DCC component visibility masks for the main browser (Task Browser / Input).
#
# Keys under component_filters are DCC identifiers (lowercase),
# e.g. "houdini", "maya", "blender", "ue5", plus optional "default"/"all" group.
# Values:
#   hide_file_types:    list of file types to completely hide from component list
#   disabled_file_types: list of file types to show but make not selectable (greyed-out)
#
# File types come from ftrack Component.file_type and are compared
# case-insensitively and without leading dot, e.g.:
#   "abc", "ma", "mb", "hip", "usd", "vdb"
#
# Example (all masks below are EMPTY by default and do not change behavior
# until you uncomment and fill them for your pipeline):
#
# component_filters:
#   default:
#     hide_file_types: []
#     disabled_file_types: []
#   houdini:
#     hide_file_types: ["ma", "mb"]          # Hide Maya scenes in Houdini browser
#     disabled_file_types: []                # Show but disable certain types if needed
#   maya:
#     hide_file_types: ["hip", "hiplc"]      # Hide Houdini scenes in Maya browser
#     disabled_file_types: []
#   blender:
#     hide_file_types: []
#     disabled_file_types: []
#   ue5:
#     hide_file_types: []
#     disabled_file_types: []

component_filters: {}
